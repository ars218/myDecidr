<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>myDecidr v2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Outfit:wght@300;400;500&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ════════════════════════════════════════
   BASE TOKENS
════════════════════════════════════════ */
:root{
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
  --border:rgba(255,255,255,.06); --text:#f0f0f0;
  --text-muted:#8888aa; --text-dim:#444460;
  --accent:#6366f1; --accent-glow:rgba(99,102,241,.35);
  --accent-soft:rgba(99,102,241,.12); --warm-shadow:rgba(99,102,241,.08);
  --nav-bg:rgba(10,10,15,.9); --btn-text:white;
  --serif:'Cormorant Garamond',serif; --sans:'Outfit',sans-serif;
  --mono:'DM Mono',monospace; --display:'Playfair Display',serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ════════════════════════════════════════
   MONO TOKENS
════════════════════════════════════════ */
/* Dotted/minimal font for mono small labels */
body.mono .theme-tab-btn,body.mono .field-label,body.mono .card-category,body.mono .detail-section-label,body.mono .insight-label,body.mono .review-date,body.mono .theme-cat-label,body.mono .header-eyebrow,body.mono .back-btn,body.mono .section-title{font-family:'DM Mono',monospace;letter-spacing:.18em}

body.mono.t-ash{--bg:#f0f0ec;--surface:#e8e8e4;--surface2:#dcdcd8;--border:rgba(0,0,0,.12);--text:#111110;--text-muted:#666662;--text-dim:#aaaaaa;--accent:#3a3a3a;--accent-glow:rgba(0,0,0,.08);--accent-soft:rgba(0,0,0,.06);--nav-bg:rgba(240,240,236,.97);--btn-text:#f0f0ec}
body.mono.t-slate{--bg:#1a1e28;--surface:#222736;--surface2:#2a3044;--border:rgba(255,255,255,.09);--text:#e2e6f4;--text-muted:#7a86a8;--text-dim:#3a4260;--accent:#c8d0f0;--accent-glow:rgba(200,208,240,.15);--accent-soft:rgba(200,208,240,.08);--nav-bg:rgba(26,30,40,.98);--btn-text:#1a1e28}
body.mono.t-bone{--bg:#f5f0e8;--surface:#ede8de;--surface2:#e4ddd0;--border:rgba(80,60,20,.14);--text:#1a160e;--text-muted:#7a6e5a;--text-dim:#b8aa90;--accent:#3d3020;--accent-glow:rgba(60,48,32,.1);--accent-soft:rgba(60,48,32,.07);--nav-bg:rgba(245,240,232,.97);--btn-text:#f5f0e8}
body.mono.t-carbon{--bg:#080808;--surface:#111111;--surface2:#1a1a1a;--border:rgba(255,255,255,.1);--text:#f2f2f2;--text-muted:#666666;--text-dim:#2e2e2e;--accent:#e8e8e8;--accent-glow:rgba(232,232,232,.1);--accent-soft:rgba(232,232,232,.06);--nav-bg:rgba(8,8,8,.98);--btn-text:#080808}

/* ════════════════════════════════════════
   HTML/BODY
════════════════════════════════════════ */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;transition:background 700ms var(--ease),color 700ms var(--ease)}

/* Grain for mono */
body.mono::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px 160px}

/* ── ORB ── */
#orb-canvas{position:fixed;top:-20vh;left:50%;transform:translateX(-50%);width:80vw;height:80vw;border-radius:50%;pointer-events:none;z-index:0;animation:orbPulse 8s ease-in-out infinite;will-change:background;transition:opacity 700ms var(--ease)}
body.mono #orb-canvas{opacity:.1;width:110vw;height:110vw}
body.grad #orb-canvas{display:none}
@keyframes orbPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:.75}50%{transform:translateX(-50%) scale(1.07);opacity:1}}
#orb-ripple{position:fixed;top:-20vh;left:50%;transform:translateX(-50%) scale(0);width:80vw;height:80vw;border-radius:50%;pointer-events:none;z-index:0;opacity:0}
#orb-ripple.pop{animation:ripOut 700ms cubic-bezier(.2,0,.4,1) forwards}
@keyframes ripOut{0%{transform:translateX(-50%) scale(.5);opacity:.6}60%{transform:translateX(-50%) scale(1.8);opacity:.1}100%{transform:translateX(-50%) scale(2.5);opacity:0}}

/* ── GRADIENT BG ── */
#grad-bg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity 700ms var(--ease)}
body.grad #grad-bg{opacity:1}
#grad-canvas{position:absolute;inset:0;width:100%;height:100%}

/* Mono top rule */
#mono-rule{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:200;transform:scaleX(0);transform-origin:left;transition:transform 500ms var(--ease),background 700ms var(--ease)}
body.mono #mono-rule{transform:scaleX(1)}

/* Grad floating header rule */
#grad-header-blur{position:fixed;top:0;left:0;right:0;height:100px;background:linear-gradient(to bottom,rgba(0,0,0,.3),transparent);pointer-events:none;z-index:5;opacity:0;transition:opacity 700ms var(--ease)}
body.grad #grad-header-blur{opacity:1}

#app{position:fixed;inset:0;overflow:hidden;z-index:1}

/* ════════════════════════════════════════
   VIEWS
════════════════════════════════════════ */
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + var(--safe-bottom));opacity:0;transform:translateY(14px);pointer-events:none;transition:opacity 350ms var(--ease),transform 350ms var(--ease)}
.view.active{opacity:1;transform:translateY(0);pointer-events:all}

/* ════════════════════════════════════════
   ORB MODE — current fluid dark style
════════════════════════════════════════ */
body:not(.mono):not(.grad) .header{padding:56px 24px 20px}
body:not(.mono):not(.grad) .header-eyebrow{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
body:not(.mono):not(.grad) .header-title{font-family:var(--serif);font-size:36px;font-weight:300;letter-spacing:-.01em;line-height:1.1}
body:not(.mono):not(.grad) .header-sub{font-size:13px;color:var(--text-muted);margin-top:10px;font-weight:300;line-height:1.5}

body:not(.mono):not(.grad) .card{margin:0 16px 12px;background:var(--surface);border-radius:16px;padding:20px;box-shadow:0 2px 8px var(--warm-shadow),0 0 0 1px rgba(255,255,255,.04);cursor:pointer;transition:transform 200ms var(--ease)}
body:not(.mono):not(.grad) .card:active{transform:scale(.98)}
body:not(.mono):not(.grad) .card-category{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
body:not(.mono):not(.grad) .card-title{font-family:var(--serif);font-size:20px;font-weight:400;line-height:1.25;margin-bottom:8px}
body:not(.mono):not(.grad) .card-meta{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:12px;margin-top:12px}
body:not(.mono):not(.grad) .review-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;color:var(--accent);background:var(--accent-soft);animation:badgePulse 3s ease-in-out infinite}
body:not(.mono):not(.grad) .review-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}
@keyframes badgePulse{0%,100%{box-shadow:0 0 8px var(--accent-soft)}50%{box-shadow:0 0 16px var(--accent-glow)}}
body:not(.mono):not(.grad) .filter-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text-muted);transition:all 200ms var(--ease)}
body:not(.mono):not(.grad) .filter-chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
body:not(.mono):not(.grad) .insight-tile{flex:1;background:var(--surface);border-radius:14px;padding:16px;box-shadow:0 2px 8px var(--warm-shadow),0 0 0 1px rgba(255,255,255,.04)}
body:not(.mono):not(.grad) .review-card{margin:0 16px 12px;background:var(--surface2);border-radius:16px;padding:18px;border:1px solid var(--border)}
body:not(.mono):not(.grad) .seg-opt{padding:9px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text-muted);font-family:var(--sans);font-size:13px;font-weight:300;cursor:pointer;transition:all 200ms var(--ease)}
body:not(.mono):not(.grad) .seg-opt.selected{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
body:not(.mono):not(.grad) .btn-primary{background:var(--accent);border-radius:14px;box-shadow:0 4px 16px var(--accent-glow)}
body:not(.mono):not(.grad) .btn-ghost{border-radius:14px;border:1px solid rgba(255,255,255,.08)}
body:not(.mono):not(.grad) .empty-icon{border-radius:50%;background:var(--accent-soft)}
body:not(.mono):not(.grad) .empty-title{font-weight:300}
body:not(.mono):not(.grad) .detail-section-content.serif{font-family:var(--serif);font-size:18px;font-weight:400}
body:not(.mono):not(.grad) .review-rating{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--accent)}

/* ════════════════════════════════════════
   MONO MODE — editorial newspaper/print
   Completely different from orbs:
   sharp corners, thick rules, monospace,
   heavy serif display, light or dark paper
════════════════════════════════════════ */
body.mono .header{padding:52px 0 0}
body.mono .header-eyebrow{font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);padding:0 24px;margin-bottom:0;border-bottom:2px solid var(--accent);padding-bottom:10px}
body.mono .header-title{font-family:var(--display);font-size:48px;font-weight:700;font-style:italic;letter-spacing:-.02em;line-height:1.0;padding:16px 24px 0;color:var(--text)}
body.mono .header-sub{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--text-muted);padding:8px 24px 16px;border-bottom:1px solid var(--border);margin-top:0}

body.mono #list-container{border-top:2px solid var(--accent)}
body.mono .card{margin:0;padding:20px 24px;border-radius:0;background:transparent;box-shadow:none;border:none;border-bottom:1px solid var(--border);cursor:pointer;position:relative;transition:background 150ms var(--ease)}
body.mono .card:active{background:var(--accent-soft)}
body.mono .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:background 150ms var(--ease)}
body.mono .card:active::before{background:var(--accent)}
body.mono .card-category{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
body.mono .card-title{font-family:var(--display);font-size:24px;font-weight:700;font-style:italic;line-height:1.2;margin-bottom:6px;color:var(--text)}
body.mono .card-meta{font-family:var(--mono);font-size:10px;color:var(--text-muted);gap:12px;margin-top:8px}
body.mono .review-badge{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:0;border:1px solid var(--accent);background:transparent;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);animation:none;box-shadow:none}
body.mono .review-badge::before{display:none}
body.mono .filter-row{padding:12px 24px 16px;gap:6px;border-bottom:1px solid var(--border)}
body.mono .filter-chip{padding:5px 12px;border-radius:2px;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text-muted);flex-shrink:0;cursor:pointer;transition:all 200ms var(--ease)}
body.mono .filter-chip.active{background:var(--accent);color:var(--btn-text);border-color:var(--accent)}
body.mono .insight-tile{flex:1;background:transparent;border-radius:0;padding:16px;border:1px solid var(--border);box-shadow:none}
body.mono .insight-num{font-family:var(--display);font-weight:700;font-style:italic}
body.mono .insight-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
body.mono .review-card{margin:0;padding:20px 24px;border-radius:0;background:transparent;border:none;border-bottom:1px solid var(--border)}
body.mono .review-rating{font-family:var(--display);font-style:italic;font-size:16px;color:var(--accent)}
body.mono .review-date{font-family:var(--mono);font-size:10px;color:var(--text-muted)}
body.mono .seg-opt{padding:10px 14px;border-radius:0;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;transition:all 200ms var(--ease)}
body.mono .seg-opt.selected{background:var(--accent);color:var(--btn-text);border-color:var(--accent)}
body.mono .btn-primary{border-radius:0;box-shadow:none;font-family:var(--mono);letter-spacing:.16em;font-size:11px;text-transform:uppercase;background:var(--accent)}
body.mono .btn-ghost{border-radius:0;border:1px solid var(--border);font-family:var(--mono);letter-spacing:.1em;font-size:11px;text-transform:uppercase}
body.mono .field-label{font-family:var(--mono);letter-spacing:.22em;font-size:9px;color:var(--text-muted)}
body.mono .field-input{font-family:var(--display);font-size:18px;font-style:italic;border-bottom:2px solid var(--border);color:var(--text)}
body.mono .field-input:focus{border-color:var(--accent)}
body.mono .step-dot{border-radius:0;height:3px}
body.mono .back-btn{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)}
body.mono .detail-section{padding:18px 24px;border-bottom:1px solid var(--border);margin-bottom:0}
body.mono .detail-section-label{font-family:var(--mono);letter-spacing:.24em;font-size:9px;color:var(--accent)}
body.mono .detail-section-content.serif{font-family:var(--display);font-size:26px;font-weight:700;font-style:italic}
body.mono .section-title{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;padding:16px 24px 10px;border-top:2px solid var(--accent);color:var(--text-muted)}
body.mono .empty-icon{border-radius:0;border:2px solid var(--accent);background:transparent}
body.mono .empty-title{font-family:var(--display);font-weight:700;font-style:italic;font-size:28px}
body.mono .empty-sub{font-family:var(--mono);font-size:11px;color:var(--text-muted)}

/* ════════════════════════════════════════
   GRADIENT MODE — glassmorphism paradise
   Completely different from both above:
   • Frosted glass panels (no dark cards)
   • Large display type, open layout
   • Cards are wide horizontal strips
   • No borders — depth through blur
   • Glowing text, neon accents
   • Floating nav — no shelf
════════════════════════════════════════ */
body.grad{--text:white;--text-muted:rgba(255,255,255,.65);--text-dim:rgba(255,255,255,.3);--border:rgba(255,255,255,.15)}

body.grad .header{padding:64px 28px 24px}
body.grad .header-eyebrow{font-size:11px;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:16px;font-family:var(--sans)}
body.grad .header-title{font-family:var(--serif);font-size:52px;font-weight:300;font-style:italic;letter-spacing:-.02em;line-height:.95;color:white;text-shadow:0 4px 40px rgba(0,0,0,.3)}
body.grad .header-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:12px}

/* Grad cards — full-width frosted strips */
body.grad #list-container{padding:0 16px}
body.grad .card{margin:0 0 10px;padding:20px 22px;border-radius:20px;background:rgba(255,255,255,.1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.15);cursor:pointer;transition:transform 200ms var(--ease),box-shadow 200ms var(--ease)}
body.grad .card:active{transform:scale(.98);box-shadow:0 4px 16px rgba(0,0,0,.15)}
body.grad .card-category{font-size:10px;font-weight:300;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:6px}
body.grad .card-title{font-family:var(--serif);font-size:22px;font-weight:300;font-style:italic;line-height:1.2;margin-bottom:8px;color:white}
body.grad .card-meta{font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:12px;margin-top:10px}
body.grad .review-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;color:white;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);animation:gradBadgePulse 3s ease-in-out infinite;box-shadow:none}
body.grad .review-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:white}
@keyframes gradBadgePulse{0%,100%{box-shadow:0 0 10px rgba(255,255,255,.1)}50%{box-shadow:0 0 20px rgba(255,255,255,.2)}}

body.grad .filter-row{padding:0 16px 20px;gap:8px}
body.grad .filter-chip{padding:8px 16px;border-radius:24px;font-size:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);backdrop-filter:blur(10px);cursor:pointer;transition:all 200ms var(--ease)}
body.grad .filter-chip.active{background:rgba(255,255,255,.22);color:white;border-color:rgba(255,255,255,.5);box-shadow:0 0 20px rgba(255,255,255,.1)}

body.grad .insight-tile{flex:1;background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:18px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
body.grad .insight-num{color:white;font-weight:300;font-style:italic;font-family:var(--serif);font-size:36px}
body.grad .insight-label{color:rgba(255,255,255,.5);font-size:11px}

body.grad .review-card{margin:0 16px 10px;background:rgba(255,255,255,.1);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:20px}
body.grad .review-rating{font-family:var(--serif);font-style:italic;font-size:17px;color:white}
body.grad .review-date{font-size:11px;color:rgba(255,255,255,.4)}

body.grad .seg-opt{padding:11px 18px;border-radius:16px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);backdrop-filter:blur(8px);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all 200ms var(--ease)}
body.grad .seg-opt.selected{background:rgba(255,255,255,.22);color:white;border-color:rgba(255,255,255,.5);box-shadow:0 0 20px rgba(255,255,255,.1)}

body.grad .btn-primary{border-radius:16px;background:rgba(255,255,255,.22);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.35);color:white;box-shadow:0 4px 24px rgba(255,255,255,.1)}
body.grad .btn-ghost{border-radius:16px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6)}
body.grad .field-label{color:rgba(255,255,255,.55);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
body.grad .field-input{color:white;border-bottom:1px solid rgba(255,255,255,.25);font-family:var(--serif);font-size:17px;font-style:italic}
body.grad .field-input::placeholder{color:rgba(255,255,255,.3)}
body.grad .field-input:focus{border-color:rgba(255,255,255,.7)}
body.grad .step-dot{background:rgba(255,255,255,.2);border-radius:2px}
body.grad .step-dot.done{background:white;opacity:1}
body.grad .step-dot.active{background:white;opacity:.5}
body.grad .back-btn{color:rgba(255,255,255,.6)}
body.grad .detail-section{padding:0 24px;margin-bottom:24px}
body.grad .detail-section-label{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
body.grad .detail-section-content{color:rgba(255,255,255,.85)}
body.grad .detail-section-content.serif{font-family:var(--serif);font-size:22px;font-weight:300;font-style:italic;color:white}
body.grad .section-title{color:rgba(255,255,255,.4)}
body.grad .empty-icon{border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px)}
body.grad .empty-title{font-family:var(--serif);font-style:italic;font-weight:300;font-size:28px;color:white}
body.grad .empty-sub{color:rgba(255,255,255,.45)}

/* ════════════════════════════════════════
   SHARED UTILITY
════════════════════════════════════════ */
.header{padding:56px 24px 20px}
.header-eyebrow{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;transition:color 700ms var(--ease)}
.header-title{font-family:var(--serif);font-size:36px;font-weight:300;letter-spacing:-.01em;line-height:1.1;transition:color 700ms var(--ease)}
.header-sub{font-size:13px;color:var(--text-muted);margin-top:10px;font-weight:300;line-height:1.5}
.confidence-dots{display:flex;gap:4px;align-items:center}
.confidence-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background 700ms var(--ease)}
.confidence-dot.active{background:var(--accent)}
body.mono .confidence-dot{border-radius:0;width:8px;height:2px}
body.grad .confidence-dot{background:rgba(255,255,255,.25);border-radius:50%}
body.grad .confidence-dot.active{background:white}
.filter-row{display:flex;gap:8px;padding:0 16px 20px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.btn-primary{width:100%;padding:16px;border:none;color:var(--btn-text);font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.05em;cursor:pointer;margin-top:8px;transition:transform 200ms var(--ease),background 700ms var(--ease),border-radius 400ms var(--ease)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{width:100%;padding:14px;background:transparent;color:var(--text-muted);font-family:var(--sans);font-size:14px;font-weight:300;cursor:pointer;margin-top:10px;transition:all 200ms var(--ease)}
.btn-ghost:active{background:rgba(255,255,255,.04)}
.field{margin-bottom:32px}
.field-label{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;display:block}
.field-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--text-dim);color:var(--text);font-family:var(--sans);font-size:15px;font-weight:300;padding:8px 0;outline:none;caret-color:var(--accent);transition:border-color 300ms var(--ease)}
.field-input::placeholder{color:var(--text-dim)}
.field-input:focus{border-color:var(--accent)}
textarea.field-input{resize:none;min-height:80px;line-height:1.6}
.seg-control{display:flex;gap:8px;flex-wrap:wrap}
.form-wrap{padding:0 24px 32px}
.step-indicator{display:flex;gap:6px;padding:20px 24px 0}
.step-dot{height:2px;flex:1;border-radius:2px;background:var(--text-dim);transition:background 400ms var(--ease)}
.step-dot.done{background:var(--accent)}
.step-dot.active{background:var(--accent);opacity:.5}
.form-step{display:none;animation:stepIn 350ms var(--ease) both}
.form-step.active{display:block}
@keyframes stepIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.detail-header{padding:56px 24px 28px}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text-muted);font-family:var(--sans);font-size:13px;cursor:pointer;padding:0;margin-bottom:24px}
.detail-section{padding:0 24px;margin-bottom:28px}
.detail-section-label{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.detail-section-content{font-size:15px;font-weight:300;color:var(--text);line-height:1.65}
.detail-section-content.serif{font-family:var(--serif);font-size:18px;font-weight:400}
.review-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.review-rating{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--accent)}
.review-date{font-size:11px;color:var(--text-dim)}
.empty-state{display:flex;flex-direction:column;align-items:center;padding:60px 32px 32px;text-align:center;gap:16px}
.empty-icon{width:64px;height:64px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.empty-title{font-family:var(--serif);font-size:24px;font-weight:300}
.empty-sub{font-size:13px;color:var(--text-muted);line-height:1.6}
.spacer{height:20px}
.section-title{font-family:var(--serif);font-size:13px;color:var(--text-muted);padding:0 24px 12px;letter-spacing:.04em}
.insight-row{display:flex;gap:10px;padding:0 16px 16px}
.insight-tile{flex:1;background:var(--surface);border-radius:14px;padding:16px}
.insight-num{font-family:var(--serif);font-size:32px;font-weight:300;line-height:1;margin-bottom:4px}
.insight-label{font-size:11px;color:var(--text-muted)}

/* ════════════════════════════════════════
   PILL NAV — three personalities
════════════════════════════════════════ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(72px + var(--safe-bottom));display:flex;align-items:flex-start;justify-content:center;padding-top:10px;z-index:100;pointer-events:none;transition:all 700ms var(--ease)}
.bottom-nav::before{content:'';position:absolute;inset:0;background:var(--nav-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);pointer-events:all;transition:all 700ms var(--ease)}
body.mono .bottom-nav::before{backdrop-filter:none;-webkit-backdrop-filter:none;border-top:3px solid var(--accent)}
body.grad .bottom-nav::before{background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}

.nav-pill-track{position:relative;display:flex;align-items:center;background:rgba(255,255,255,.06);border-radius:40px;padding:4px;pointer-events:all;z-index:1;transition:all 400ms var(--ease)}
body.mono .nav-pill-track{border-radius:6px;background:rgba(128,128,128,.08)}
body.grad .nav-pill-track{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:40px}

.nav-indicator{position:absolute;top:4px;left:4px;height:calc(100% - 8px);border-radius:36px;background:var(--accent);box-shadow:0 2px 12px var(--accent-glow);transition:left 350ms cubic-bezier(.34,1.4,.64,1),width 350ms cubic-bezier(.34,1.4,.64,1),background 700ms var(--ease),border-radius 400ms var(--ease);pointer-events:none;z-index:0}
body.mono .nav-indicator{border-radius:4px;box-shadow:none}
body.grad .nav-indicator{background:rgba(255,255,255,.25);box-shadow:0 2px 16px rgba(255,255,255,.15);border-radius:36px}

.nav-btn{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 18px;cursor:pointer;background:none;border:none;color:var(--text-dim);font-family:var(--sans);font-size:10px;font-weight:400;letter-spacing:.08em;border-radius:36px;transition:color 300ms var(--ease)}
.nav-btn.active{color:white}
body.mono .nav-btn{font-family:var(--mono);font-size:9px;letter-spacing:.12em;border-radius:4px;color:var(--text-muted)}
body.mono .nav-btn.active{color:var(--btn-text)}
body.grad .nav-btn{color:rgba(255,255,255,.45)}
body.grad .nav-btn.active{color:white}
.nav-btn svg{transition:transform 200ms var(--ease)}
.nav-btn:active svg{transform:scale(.88)}

/* FAB */
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px var(--accent-glow);z-index:99;transition:all 400ms var(--ease)}
.fab:active{transform:scale(.92)}
body.mono .fab{border-radius:6px;box-shadow:none}
body.grad .fab{background:rgba(255,255,255,.2);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.35);box-shadow:0 4px 24px rgba(255,255,255,.15);border-radius:50%}

/* CUSTOMIZE */
.custom-wrap{padding:0 20px 40px}
.theme-cat-section{margin-bottom:36px;display:none}
.theme-cat-section.active-tab{display:block}

/* ── THEME CATEGORY PILL TAB BAR ── */
.theme-tab-bar-wrap{
  padding:16px 20px 22px;
  position:sticky;top:0;z-index:10;
  background:var(--bg);
  transition:background 700ms var(--ease);
}
body.grad .theme-tab-bar-wrap{background:transparent;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
body.mono .theme-tab-bar-wrap{background:var(--bg)}

.theme-tab-track{
  position:relative;display:flex;align-items:stretch;
  background:rgba(255,255,255,.055);
  border-radius:32px;padding:3px;
  transition:background 700ms var(--ease);
}
body.mono .theme-tab-track{border-radius:8px;background:rgba(128,128,128,.09)}
body.grad .theme-tab-track{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.14)}

.theme-tab-indicator{
  position:absolute;top:3px;left:3px;
  height:calc(100% - 6px);
  border-radius:28px;
  background:var(--accent);
  box-shadow:0 2px 10px var(--accent-glow);
  transition:left 320ms cubic-bezier(.34,1.35,.64,1),
             width 320ms cubic-bezier(.34,1.35,.64,1),
             background 700ms var(--ease),
             box-shadow 700ms var(--ease),
             border-radius 400ms var(--ease);
  pointer-events:none;z-index:0;
}
body.mono .theme-tab-indicator{border-radius:5px;box-shadow:none}
body.grad .theme-tab-indicator{background:rgba(255,255,255,.28);box-shadow:0 2px 14px rgba(255,255,255,.18)}

.theme-tab-btn{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  flex:1;padding:9px 8px 8px;
  cursor:pointer;background:none;border:none;
  color:var(--text-dim);
  border-radius:28px;
  font-family:var(--sans);font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  transition:color 280ms var(--ease);
  -webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.theme-tab-btn.active{color:white}
body.mono .theme-tab-btn{font-family:var(--mono);font-size:8px;letter-spacing:.18em;border-radius:5px;color:var(--text-muted)}
body.mono .theme-tab-btn.active{color:var(--btn-text)}
body.grad .theme-tab-btn{color:rgba(255,255,255,.4)}
body.grad .theme-tab-btn.active{color:white}
.theme-tab-btn svg{transition:transform 200ms var(--ease)}
.theme-tab-btn:active svg{transform:scale(.85)}

.theme-cat-label{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--text-muted);margin:0 0 14px 2px;display:block}
body.mono .theme-cat-label{font-family:var(--mono)}
body.grad .theme-cat-label{color:rgba(255,255,255,.5)}
.theme-grid-mono{display:grid;grid-template-columns:1fr 1fr;gap:2px;border:1px solid var(--border)}
.theme-card-mono{padding:20px 16px;cursor:pointer;position:relative;border:2px solid transparent;transition:transform 200ms var(--ease),border-color 300ms var(--ease)}
.theme-card-mono:active{transform:scale(.96)}
.theme-card-mono.selected{border-color:var(--accent)}
.mono-preview-swatch{width:100%;height:28px;margin-bottom:12px;border:1px solid rgba(128,128,128,.2)}
.theme-tick-mono{position:absolute;top:8px;right:8px;width:16px;height:16px;display:none;align-items:center;justify-content:center}
.theme-card-mono.selected .theme-tick-mono{display:flex}
.theme-grid-color{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.theme-card{border-radius:18px;padding:18px 16px;border:1px solid rgba(255,255,255,.06);background:var(--surface);cursor:pointer;position:relative;overflow:hidden;transition:all 300ms var(--ease)}
body.mono .theme-card{border-radius:4px}
body.grad .theme-card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:16px}
.theme-card:active{transform:scale(.95)}
.theme-card.selected{border-color:rgba(255,255,255,.22)}
body.grad .theme-card.selected{border-color:rgba(255,255,255,.4)}
.theme-orb{width:50px;height:50px;border-radius:50%;margin-bottom:12px}
.theme-name{font-size:13px;font-weight:400;color:var(--text)}
body.grad .theme-name{color:rgba(255,255,255,.85)}
.theme-tick{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.9);display:none;align-items:center;justify-content:center}
.theme-card.selected .theme-tick{display:flex}
.theme-grid-grad{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.theme-card-grad{border-radius:16px;padding:0;cursor:pointer;position:relative;overflow:hidden;height:90px;border:2px solid transparent;transition:all 200ms var(--ease)}
body.mono .theme-card-grad{border-radius:4px}
.theme-card-grad:active{transform:scale(.96)}
.theme-card-grad.selected{border-color:rgba(255,255,255,.7)}
.grad-swatch{position:absolute;inset:0;border-radius:14px}
.grad-theme-name{position:absolute;bottom:10px;left:12px;font-size:12px;font-weight:500;color:white;text-shadow:0 1px 8px rgba(0,0,0,.5);z-index:1}
.theme-tick-grad{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.9);display:none;align-items:center;justify-content:center;z-index:1}
.theme-card-grad.selected .theme-tick-grad{display:flex}

/* TOAST */
.toast{position:fixed;bottom:calc(88px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);color:var(--text);padding:12px 20px;border-radius:24px;font-size:13px;font-weight:300;white-space:nowrap;z-index:200;opacity:0;transition:all 300ms var(--ease);pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.06)}
body.mono .toast{border-radius:4px;font-family:var(--mono);font-size:11px;border:1px solid var(--accent);box-shadow:none;background:var(--surface)}
body.grad .toast{background:rgba(255,255,255,.15);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);color:white;border-radius:24px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
</style>
</head>
<body>

<div id="mono-rule"></div>
<div id="orb-canvas"></div>
<div id="orb-ripple"></div>
<div id="grad-bg"><canvas id="grad-canvas"></canvas></div>
<div id="grad-header-blur"></div>

<div id="app">
  <!-- LIST -->
  <div class="view active" id="view-list">
    <div class="header">
      <div class="header-eyebrow">myDecidr</div>
      <h1 class="header-title">Your<br><em>decisions</em></h1>
      <p class="header-sub" id="list-sub"></p>
    </div>
    <div class="filter-row">
      <button class="filter-chip active" data-cat="All" onclick="setFilter('All')">All</button>
      <button class="filter-chip" data-cat="Career" onclick="setFilter('Career')">Career</button>
      <button class="filter-chip" data-cat="Finance" onclick="setFilter('Finance')">Finance</button>
      <button class="filter-chip" data-cat="Relationships" onclick="setFilter('Relationships')">Relationships</button>
      <button class="filter-chip" data-cat="Health" onclick="setFilter('Health')">Health</button>
      <button class="filter-chip" data-cat="Personal" onclick="setFilter('Personal')">Personal</button>
      <button class="filter-chip" data-cat="Other" onclick="setFilter('Other')">Other</button>
    </div>
    <div id="list-container"></div>
  </div>

  <!-- INSIGHTS -->
  <div class="view" id="view-insights">
    <div class="header">
      <div class="header-eyebrow">Reflections</div>
      <h1 class="header-title">Your<br><em>patterns</em></h1>
    </div>
    <div id="insights-content"></div>
  </div>

  <!-- CUSTOMIZE -->
  <div class="view" id="view-customize">
    <div class="header">
      <div class="header-eyebrow">myDecidr</div>
      <h1 class="header-title">Make it<br><em>yours</em></h1>
      <p class="header-sub">Saved automatically.</p>
    </div>

    <!-- Pill tab switcher: Orbs → Gradients → Mono -->
    <div class="theme-tab-bar-wrap">
      <div class="theme-tab-track" id="theme-tab-track">
        <div class="theme-tab-indicator" id="theme-tab-ind"></div>

        <button class="theme-tab-btn active" id="ttab-orb" onclick="switchThemeTab('orb',this)">
          <!-- Orb icon: concentric circle -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="4" fill="currentColor" opacity=".35"/>
          </svg>
          Orbs
        </button>

        <button class="theme-tab-btn" id="ttab-grad" onclick="switchThemeTab('grad',this)">
          <!-- Gradient icon: half-filled diamond -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <defs><linearGradient id="gig" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="currentColor" stop-opacity=".9"/><stop offset="100%" stop-color="currentColor" stop-opacity=".15"/></linearGradient></defs>
            <rect x="4" y="4" width="16" height="16" rx="5" fill="url(#gig)" stroke="currentColor"/>
          </svg>
          Gradients
        </button>

        <button class="theme-tab-btn" id="ttab-mono" onclick="switchThemeTab('mono',this)">
          <!-- Mono icon: two clean horizontal lines (minimal) -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="3" y1="8"  x2="21" y2="8"/>
            <line x1="3" y1="14" x2="14" y2="14"/>
            <circle cx="19" cy="14" r="2.5" fill="currentColor" opacity=".5"/>
          </svg>
          Mono
        </button>
      </div>
    </div>

    <div class="custom-wrap">
      <div class="theme-cat-section active-tab" id="tab-orb">
        <div class="theme-grid-color" id="color-grid"></div>
      </div>
      <div class="theme-cat-section" id="tab-grad">
        <div class="theme-grid-grad" id="grad-grid"></div>
      </div>
      <div class="theme-cat-section" id="tab-mono">
        <div class="theme-grid-mono" id="mono-grid"></div>
      </div>
    </div>
  </div>

  <!-- CREATE -->
  <div class="view" id="view-create">
    <div class="header">
      <button class="back-btn" onclick="cancelCreate()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</button>
      <div class="header-eyebrow">New Entry</div>
      <h1 class="header-title">Record this<br><em>decision</em></h1>
    </div>
    <div class="step-indicator"><div class="step-dot active" id="sd-0"></div><div class="step-dot" id="sd-1"></div><div class="step-dot" id="sd-2"></div></div>
    <div class="form-wrap">
      <div class="form-step active" id="step-0">
        <div class="spacer"></div>
        <div class="field"><label class="field-label">The decision</label><input class="field-input" id="f-title" type="text" placeholder="What did you decide?" autocomplete="off"></div>
        <div class="field"><label class="field-label">Category</label>
          <div class="seg-control">
            <button class="seg-opt" data-val="Career" onclick="selectSeg('f-category',this)">Career</button>
            <button class="seg-opt" data-val="Finance" onclick="selectSeg('f-category',this)">Finance</button>
            <button class="seg-opt" data-val="Relationships" onclick="selectSeg('f-category',this)">Relationships</button>
            <button class="seg-opt" data-val="Health" onclick="selectSeg('f-category',this)">Health</button>
            <button class="seg-opt" data-val="Personal" onclick="selectSeg('f-category',this)">Personal</button>
            <button class="seg-opt" data-val="Other" onclick="selectSeg('f-category',this)">Other</button>
          </div><input type="hidden" id="f-category"></div>
        <div class="field"><label class="field-label">The situation</label><textarea class="field-input" id="f-situation" placeholder="What was happening?"></textarea></div>
        <div class="field"><label class="field-label">Options considered</label><textarea class="field-input" id="f-options" placeholder="What other paths did you see?"></textarea></div>
        <div class="field"><label class="field-label">What you chose</label><input class="field-input" id="f-chosen" type="text" placeholder="The choice you made"></div>
        <button class="btn-primary" onclick="nextStep(1)">Continue →</button>
      </div>
      <div class="form-step" id="step-1">
        <div class="spacer"></div>
        <div class="field"><label class="field-label">Your reasoning</label><textarea class="field-input" id="f-reasoning" placeholder="Why did this option make sense?"></textarea></div>
        <div class="field"><label class="field-label">Confidence</label>
          <div class="seg-control">
            <button class="seg-opt" data-val="Low" onclick="selectSeg('f-confidence',this)">Low</button>
            <button class="seg-opt" data-val="Medium" onclick="selectSeg('f-confidence',this)">Medium</button>
            <button class="seg-opt" data-val="High" onclick="selectSeg('f-confidence',this)">High</button>
          </div><input type="hidden" id="f-confidence"></div>
        <button class="btn-primary" onclick="nextStep(2)">Continue →</button>
        <button class="btn-ghost" onclick="nextStep(0)">← Back</button>
      </div>
      <div class="form-step" id="step-2">
        <div class="spacer"></div>
        <div class="field"><label class="field-label">Expected outcome</label><textarea class="field-input" id="f-expected" placeholder="What do you hope will happen?"></textarea></div>
        <button class="btn-primary" onclick="saveDecision()">Save Decision</button>
        <button class="btn-ghost" onclick="nextStep(1)">← Back</button>
      </div>
    </div>
  </div>

  <!-- DETAIL -->
  <div class="view" id="view-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="showView('list')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> All decisions</button>
      <div class="header-eyebrow" id="d-category"></div>
      <h1 class="header-title" id="d-title" style="font-size:30px"></h1>
    </div>
    <div class="detail-section"><div class="detail-section-label">Date recorded</div><div class="detail-section-content" id="d-date"></div></div>

<script>
const MONO_THEMES=[
  {id:'ash',name:'Ash',desc:'Silver cool',mono:true,bodyClass:'t-ash',bg:'#f0f0ec',surface:'#e8e8e4',accent:'#3a3a3a',c1:[160,160,175],c2:[190,190,205]},
  {id:'slate',name:'Slate',desc:'Midnight blue',mono:true,bodyClass:'t-slate',bg:'#1a1e28',surface:'#222736',accent:'#c8d0f0',c1:[80,90,115],c2:[110,125,160]},
  {id:'bone',name:'Bone',desc:'Warm ivory',mono:true,bodyClass:'t-bone',bg:'#f5f0e8',surface:'#ede8de',accent:'#3d3020',c1:[185,170,145],c2:[210,195,170]},
  {id:'carbon',name:'Carbon',desc:'Deep black',mono:true,bodyClass:'t-carbon',bg:'#080808',surface:'#111111',accent:'#e8e8e8',c1:[40,40,45],c2:[70,70,78]},
];
const COLOR_THEMES=[
  {id:'blue',name:'Blue Orb',c1:[79,70,229],c2:[99,102,241],accent:'#6366f1',glow:'rgba(99,102,241,.35)',soft:'rgba(99,102,241,.12)',shadow:'rgba(99,102,241,.08)'},
  {id:'green',name:'Green Orb',c1:[22,163,74],c2:[34,197,94],accent:'#22c55e',glow:'rgba(34,197,94,.35)',soft:'rgba(34,197,94,.12)',shadow:'rgba(34,197,94,.08)'},
  {id:'red',name:'Red Orb',c1:[185,28,28],c2:[239,68,68],accent:'#ef4444',glow:'rgba(239,68,68,.35)',soft:'rgba(239,68,68,.12)',shadow:'rgba(239,68,68,.08)'},
  {id:'orange',name:'Orange Orb',c1:[194,65,12],c2:[249,115,22],accent:'#f97316',glow:'rgba(249,115,22,.35)',soft:'rgba(249,115,22,.12)',shadow:'rgba(249,115,22,.08)'},
  {id:'pink',name:'Pink Orb',c1:[190,24,93],c2:[236,72,153],accent:'#ec4899',glow:'rgba(236,72,153,.35)',soft:'rgba(236,72,153,.12)',shadow:'rgba(236,72,153,.08)'},
  {id:'purple',name:'Purple Orb',c1:[109,40,217],c2:[139,92,246],accent:'#8b5cf6',glow:'rgba(139,92,246,.35)',soft:'rgba(139,92,246,.12)',shadow:'rgba(139,92,246,.08)'},
  {id:'white',name:'White Orb',c1:[180,180,200],c2:[220,220,240],accent:'#c8c8e0',glow:'rgba(220,220,240,.25)',soft:'rgba(220,220,240,.1)',shadow:'rgba(220,220,240,.06)'},
  {id:'cyan',name:'Cyan Orb',c1:[14,116,144],c2:[6,182,212],accent:'#06b6d4',glow:'rgba(6,182,212,.35)',soft:'rgba(6,182,212,.12)',shadow:'rgba(6,182,212,.08)'},
];
const GRAD_THEMES=[
  {id:'aurora',name:'Aurora',grad:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',blobs:['#6b21a8','#3b82f6','#06b6d4'],accent:'#a78bfa',glow:'rgba(167,139,250,.35)',soft:'rgba(167,139,250,.15)'},
  {id:'ember',name:'Ember',grad:'linear-gradient(135deg,#1a0500,#7c1d06,#b91c1c)',blobs:['#dc2626','#ea580c','#f59e0b'],accent:'#fb923c',glow:'rgba(251,146,60,.35)',soft:'rgba(251,146,60,.15)'},
  {id:'ocean',name:'Ocean Deep',grad:'linear-gradient(135deg,#030712,#0c4a6e,#164e63)',blobs:['#0284c7','#0891b2','#10b981'],accent:'#38bdf8',glow:'rgba(56,189,248,.35)',soft:'rgba(56,189,248,.15)'},
  {id:'sakura',name:'Sakura',grad:'linear-gradient(135deg,#1a0010,#831843,#9d174d)',blobs:['#db2777','#ec4899','#f9a8d4'],accent:'#f9a8d4',glow:'rgba(249,168,212,.35)',soft:'rgba(249,168,212,.15)'},
  {id:'forest',name:'Forest Mist',grad:'linear-gradient(135deg,#052e16,#14532d,#1a3a2a)',blobs:['#15803d','#16a34a','#4ade80'],accent:'#4ade80',glow:'rgba(74,222,128,.35)',soft:'rgba(74,222,128,.15)'},
  {id:'void',name:'Void',grad:'linear-gradient(135deg,#000000,#0a0a1a,#050510)',blobs:['#4c1d95','#1e1b4b','#312e81'],accent:'#818cf8',glow:'rgba(129,140,248,.3)',soft:'rgba(129,140,248,.12)'},
  {id:'sunrise',name:'Sunrise',grad:'linear-gradient(160deg,#0c0a20,#3b0764,#7c2d12)',blobs:['#9333ea','#ec4899','#f97316'],accent:'#f472b6',glow:'rgba(244,114,182,.35)',soft:'rgba(244,114,182,.15)'},
  {id:'glacier',name:'Glacier',grad:'linear-gradient(135deg,#0f172a,#1e3a5f,#0f2940)',blobs:['#38bdf8','#e0f2fe','#7dd3fc'],accent:'#e0f2fe',glow:'rgba(224,242,254,.25)',soft:'rgba(224,242,254,.12)'},
  {id:'tropical',name:'Tropical',grad:'linear-gradient(135deg,#022c22,#134e4a,#042f2e)',blobs:['#0d9488','#34d399','#fbbf24'],accent:'#34d399',glow:'rgba(52,211,153,.35)',soft:'rgba(52,211,153,.15)'},
  {id:'dusk',name:'Dusk',grad:'linear-gradient(135deg,#0f0a1e,#1e1040,#2d1b69)',blobs:['#7c3aed','#db2777','#f59e0b'],accent:'#c084fc',glow:'rgba(192,132,252,.35)',soft:'rgba(192,132,252,.15)'},
];
const ALL_THEMES=[...MONO_THEMES,...COLOR_THEMES,...GRAD_THEMES];

let decisions=[],currentFilter='All',currentDecisionId=null,currentStep=0;
let currentThemeId=localStorage.getItem('decidr_theme')||'blue';
let orbRaf=null,orbNow={r1:79,g1:70,b1:229,r2:99,g2:102,b2:241},gradAnimRaf=null;

function load(){try{decisions=JSON.parse(localStorage.getItem('decidr_v1')||'[]')}catch(e){decisions=[]}}
function save(){localStorage.setItem('decidr_v1',JSON.stringify(decisions))}

function initGradBg(theme){
  const canvas=document.getElementById('grad-canvas');
  const ctx=canvas.getContext('2d');
  const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight};
  resize();window.addEventListener('resize',resize);
  if(gradAnimRaf){cancelAnimationFrame(gradAnimRaf);gradAnimRaf=null}
  const blobs=theme.blobs.map((hex,i)=>{
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return{x:canvas.width*(0.15+i*0.35),y:canvas.height*(0.15+i*0.3),r:canvas.width*.5,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,cr:r,cg:g,cb:b};
  });
  document.getElementById('grad-bg').style.background=theme.grad;
  function frame(){
    canvas.width=canvas.width;
    blobs.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<-b.r||b.x>canvas.width+b.r)b.vx*=-1;if(b.y<-b.r||b.y>canvas.height+b.r)b.vy*=-1;const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,`rgba(${b.cr},${b.cg},${b.cb},.4)`);g.addColorStop(1,`rgba(${b.cr},${b.cg},${b.cb},0)`);ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height)});
    gradAnimRaf=requestAnimationFrame(frame);
  }
  frame();
}
function stopGradBg(){if(gradAnimRaf){cancelAnimationFrame(gradAnimRaf);gradAnimRaf=null}const canvas=document.getElementById('grad-canvas');canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);document.getElementById('grad-bg').style.background='none'}

function applyTheme(id,animate){
  const t=ALL_THEMES.find(x=>x.id===id)||COLOR_THEMES[0];
  currentThemeId=id;localStorage.setItem('decidr_theme',id);
  const body=document.body,R=document.documentElement;
  body.classList.remove('mono','grad');
  MONO_THEMES.forEach(m=>body.classList.remove(m.bodyClass));

  if(t.mono){
    body.classList.add('mono',t.bodyClass);
    R.style.removeProperty('--accent');R.style.removeProperty('--accent-glow');R.style.removeProperty('--accent-soft');R.style.removeProperty('--warm-shadow');
    stopGradBg();
  }else if(t.blobs){
    body.classList.add('grad');
    R.style.setProperty('--accent',t.accent);R.style.setProperty('--accent-glow',t.glow);R.style.setProperty('--accent-soft',t.soft);R.style.setProperty('--warm-shadow','rgba(0,0,0,.2)');
    R.style.setProperty('--nav-bg','rgba(0,0,0,.2)');R.style.setProperty('--surface','rgba(255,255,255,.08)');R.style.setProperty('--surface2','rgba(255,255,255,.12)');
    initGradBg(t);
  }else{
    R.style.setProperty('--accent',t.accent);R.style.setProperty('--accent-glow',t.glow);R.style.setProperty('--accent-soft',t.soft);R.style.setProperty('--warm-shadow',t.shadow);
    R.style.setProperty('--nav-bg','rgba(10,10,15,.9)');R.style.setProperty('--surface','#12121a');R.style.setProperty('--surface2','#1a1a26');R.style.setProperty('--bg','#0a0a0f');
    R.style.setProperty('--text','#f0f0f0');R.style.setProperty('--text-muted','#8888aa');R.style.setProperty('--text-dim','#444460');
    stopGradBg();
  }

  const lightMono=(id==='ash'||id==='bone');
  document.getElementById('fab-icon').setAttribute('stroke',lightMono?'#111':'white');

  if(animate){
    const rip=document.getElementById('orb-ripple');const[r,g,b]=t.c2||[200,200,200];
    rip.style.background=`radial-gradient(ellipse at center,rgba(${r},${g},${b},.5) 0%,rgba(${r},${g},${b},.08) 55%,transparent 70%)`;
    rip.classList.remove('pop');void rip.offsetWidth;rip.classList.add('pop');
    setTimeout(()=>rip.classList.remove('pop'),750);
  }

  if(!t.blobs){
    const from={...orbNow},to={r1:(t.c1||[60,60,60])[0],g1:(t.c1||[60,60,60])[1],b1:(t.c1||[60,60,60])[2],r2:(t.c2||[80,80,80])[0],g2:(t.c2||[80,80,80])[1],b2:(t.c2||[80,80,80])[2]};
    const dur=animate?800:0,t0=performance.now();if(orbRaf)cancelAnimationFrame(orbRaf);
    const a1=t.mono?.08:.18,a2=t.mono?.04:.08;
    function tick(now){const p=dur===0?1:Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,4),lr=(a,b)=>Math.round(a+(b-a)*e);
      orbNow={r1:lr(from.r1,to.r1),g1:lr(from.g1,to.g1),b1:lr(from.b1,to.b1),r2:lr(from.r2,to.r2),g2:lr(from.g2,to.g2),b2:lr(from.b2,to.b2)};
      const{r1,g1,b1,r2,g2,b2}=orbNow;
      document.getElementById('orb-canvas').style.background=`radial-gradient(ellipse at center,rgba(${r1},${g1},${b1},${a1}) 0%,rgba(${r2},${g2},${b2},${a2}) 40%,transparent 70%)`;
      if(p<1)orbRaf=requestAnimationFrame(tick);else orbRaf=null;
    }
    orbRaf=requestAnimationFrame(tick);
  }
  updateNavIndicator();
}

function updateNavIndicator(){
  const active=document.querySelector('.nav-btn.active'),ind=document.getElementById('nav-indicator'),track=document.getElementById('nav-track');
  if(!active||!ind||!track)return;
  const tRect=track.getBoundingClientRect(),bRect=active.getBoundingClientRect();
  ind.style.left=(bRect.left-tRect.left)+'px';ind.style.width=bRect.width+'px';
}

// ═══ THEME TAB SWITCHER ═══════════════════════════════════════════
let activeThemeTab = 'orb';

function switchThemeTab(tab, btn) {
  activeThemeTab = tab;
  // Update buttons
  document.querySelectorAll('.theme-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Update panels
  document.querySelectorAll('.theme-cat-section').forEach(s => s.classList.remove('active-tab'));
  document.getElementById('tab-' + tab).classList.add('active-tab');
  // Slide indicator
  updateThemeTabIndicator();
}

function updateThemeTabIndicator() {
  const active = document.querySelector('.theme-tab-btn.active');
  const ind = document.getElementById('theme-tab-ind');
  const track = document.getElementById('theme-tab-track');
  if (!active || !ind || !track) return;
  const tRect = track.getBoundingClientRect();
  const bRect = active.getBoundingClientRect();
  ind.style.left = (bRect.left - tRect.left) + 'px';
  ind.style.width = bRect.width + 'px';
}

function renderThemeGrids(){
  document.getElementById('mono-grid').innerHTML=MONO_THEMES.map(t=>{
    const sel=t.id===currentThemeId,tickColor=(t.id==='ash'||t.id==='bone')?'#111':'#fff',tickBg=(t.id==='ash'||t.id==='bone')?'rgba(0,0,0,.8)':'rgba(255,255,255,.9)';
    return`<div class="theme-card-mono${sel?' selected':''}" id="tc-${t.id}" style="background:${t.bg};border-color:${sel?t.accent:'transparent'}" onclick="pickTheme('${t.id}')"><div class="mono-preview-swatch" style="background:linear-gradient(135deg,${t.surface} 0%,${t.bg} 100%)"></div><div style="color:${t.accent};font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px">${t.name}</div><div style="color:${t.accent};font-family:'DM Mono',monospace;font-size:10px;opacity:.5">${t.desc}</div><div class="theme-tick-mono" style="background:${tickBg}"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="${tickColor}" stroke-width="2.5"><polyline points="2,6 5,9 10,3"/></svg></div></div>`;
  }).join('');

  document.getElementById('color-grid').innerHTML=COLOR_THEMES.map(t=>{
    const[r,g,b]=t.c2,sel=t.id===currentThemeId;
    return`<div class="theme-card${sel?' selected':''}" id="tc-${t.id}" onclick="pickTheme('${t.id}')"><div class="theme-orb" style="background:radial-gradient(ellipse at 38% 32%,rgba(${t.c1[0]},${t.c1[1]},${t.c1[2]},.95) 0%,rgba(${r},${g},${b},.65) 50%,rgba(${r},${g},${b},.2) 100%);${sel?`box-shadow:0 0 20px 5px rgba(${r},${g},${b},.55)`:''}" ></div><div class="theme-name">${t.name}</div><div class="theme-tick"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#0a0a0f" stroke-width="2.5"><polyline points="2,6 5,9 10,3"/></svg></div></div>`;
  }).join('');

  document.getElementById('grad-grid').innerHTML=GRAD_THEMES.map(t=>{
    const sel=t.id===currentThemeId;
    return`<div class="theme-card-grad${sel?' selected':''}" id="tc-${t.id}" onclick="pickTheme('${t.id}')"><div class="grad-swatch" style="background:${t.grad}"></div><div class="grad-theme-name">${t.name}</div><div class="theme-tick-grad"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#0a0a0f" stroke-width="2.5"><polyline points="2,6 5,9 10,3"/></svg></div></div>`;
  }).join('');

  // Auto-switch to the tab of the currently active theme
  const cur = ALL_THEMES.find(x=>x.id===currentThemeId);
  if (cur) {
    const tab = cur.mono ? 'mono' : cur.blobs ? 'grad' : 'orb';
    if (tab !== activeThemeTab) {
      const btn = document.getElementById('ttab-' + tab);
      if (btn) switchThemeTab(tab, btn);
    }
  }

  requestAnimationFrame(updateThemeTabIndicator);
}

function pickTheme(id){applyTheme(id,true);renderThemeGrids();showToast(ALL_THEMES.find(x=>x.id===id).name+' applied')}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const v=document.getElementById('view-'+name);if(v){v.classList.add('active');v.scrollTop=0}
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('active');
  document.getElementById('fab-btn').style.display=(name==='list'||name==='insights')?'flex':'none';
  requestAnimationFrame(updateNavIndicator);
}
function navTo(name){if(name==='list')renderList();if(name==='insights')renderInsights();if(name==='customize'){renderThemeGrids();requestAnimationFrame(updateThemeTabIndicator);}showView(name)}

function setFilter(cat){currentFilter=cat;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.cat===cat));renderList()}
function getDueBadge(d){const now=Date.now(),created=new Date(d.createdAt).getTime(),age=(now-created)/864e5,reviews=d.reviews||[];const dayOf=r=>(new Date(r.date).getTime()-created)/864e5;if(age>=365&&!reviews.some(r=>dayOf(r)>=330))return'1 year review due';if(age>=90&&!reviews.some(r=>dayOf(r)>=80&&dayOf(r)<330))return'90-day review due';if(age>=30&&!reviews.some(r=>dayOf(r)>=25&&dayOf(r)<80))return'30-day review due';return null}
function confDots(c){const n={Low:1,Medium:2,High:3}[c]||0;return'<div class="confidence-dots">'+[1,2,3].map(i=>`<div class="confidence-dot${i<=n?' active':''}"></div>`).join('')+'</div>'}

function renderList(){
  const filtered=currentFilter==='All'?decisions:decisions.filter(d=>d.category===currentFilter);
  document.getElementById('list-sub').textContent=decisions.length===0?'No decisions recorded yet':`${decisions.length} decision${decisions.length!==1?'s':''} recorded`;
  const c=document.getElementById('list-container');
  if(!filtered.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg></div><div class="empty-title">Nothing here yet</div><div class="empty-sub">Tap + to record your first decision.</div></div>`;return}
  c.innerHTML=[...filtered].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(d=>{const badge=getDueBadge(d),date=new Date(d.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),rc=(d.reviews||[]).length;return`<div class="card" onclick="openDetail('${d.id}')"><div class="card-category">${d.category}</div><div class="card-title">${esc(d.title)}</div>${badge?`<div style="margin:10px 0 4px"><span class="review-badge">${badge}</span></div>`:''}<div class="card-meta">${confDots(d.confidence)}<span>${date}</span>${rc?`<span>${rc} review${rc>1?'s':''}</span>`:''}</div></div>`}).join('');
}

function renderInsights(){
  const el=document.getElementById('insights-content');
  if(!decisions.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg></div><div class="empty-title">Patterns emerge</div><div class="empty-sub">Record and review decisions to see insights.</div></div>`;return}
  const total=decisions.length,reviewed=decisions.filter(d=>d.reviews?.length>0).length,due=decisions.filter(d=>getDueBadge(d)).length;
  const cats={};decisions.forEach(d=>{cats[d.category]=(cats[d.category]||0)+1});const top=Object.entries(cats).sort((a,b)=>b[1]-a[1])[0];
  const ratings=[];decisions.forEach(d=>(d.reviews||[]).forEach(r=>ratings.push(r.rating)));
  const rm={'Much worse':1,'Worse':2,'As expected':3,'Better':4,'Much better':5};
  const avg=ratings.length?(ratings.reduce((s,r)=>s+(rm[r]||3),0)/ratings.length).toFixed(1):'—';
  el.innerHTML=`<div class="insight-row"><div class="insight-tile"><div class="insight-num">${total}</div><div class="insight-label">Decisions</div></div><div class="insight-tile"><div class="insight-num">${reviewed}</div><div class="insight-label">Reviewed</div></div></div><div class="insight-row"><div class="insight-tile"><div class="insight-num">${due}</div><div class="insight-label">Reviews due</div></div><div class="insight-tile"><div class="insight-num" style="font-size:22px;padding-top:4px">${avg!=='—'?avg+'/5':'—'}</div><div class="insight-label">Avg. outcome</div></div></div>${top?`<div style="padding:0 16px 16px"><div class="insight-tile"><div class="insight-label" style="margin-bottom:6px">Most common</div><div class="insight-num" style="font-size:22px;font-family:var(--serif)">${top[0]}</div><div class="insight-label">${top[1]} decision${top[1]>1?'s':''}</div></div></div>`:''}${ratings.length?`<div style="padding:0 16px"><div class="insight-tile"><div class="insight-label" style="margin-bottom:12px">Outcome distribution</div>${['Much better','Better','As expected','Worse','Much worse'].map(r=>{const cnt=ratings.filter(x=>x===r).length,pct=Math.round(cnt/ratings.length*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;color:var(--text-muted)">${r}</span><span style="font-size:12px;color:var(--text-dim)">${cnt}</span></div><div style="height:3px;background:var(--surface2);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent);border-radius:2px"></div></div></div>`}).join('')}</div></div>`:''}<div class="spacer"></div>`;
}

function showCreate(){currentStep=0;['f-title','f-situation','f-options','f-chosen','f-reasoning','f-confidence','f-expected','f-category'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});document.querySelectorAll('.seg-opt').forEach(b=>b.classList.remove('selected'));showStep(0);showView('create')}
function cancelCreate(){showView('list');renderList()}
function showStep(n){currentStep=n;document.querySelectorAll('.form-step').forEach((s,i)=>s.classList.toggle('active',i===n));for(let i=0;i<3;i++){const d=document.getElementById('sd-'+i);d.classList.toggle('done',i<n);d.classList.toggle('active',i===n)}}
function nextStep(n){if(n>currentStep){if(currentStep===0){if(!document.getElementById('f-title').value.trim()){showToast('Please enter the decision');return}if(!document.getElementById('f-category').value){showToast('Please select a category');return}if(!document.getElementById('f-chosen').value.trim()){showToast('Please enter the choice you made');return}}if(currentStep===1){if(!document.getElementById('f-reasoning').value.trim()){showToast('Please describe your reasoning');return}if(!document.getElementById('f-confidence').value){showToast('Please select a confidence level');return}}}showStep(n)}
function selectSeg(fid,btn){btn.closest('.seg-control').querySelectorAll('.seg-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById(fid).value=btn.dataset.val}
function saveDecision(){const exp=document.getElementById('f-expected').value.trim();if(!exp){showToast('Please describe the expected outcome');return}decisions.unshift({id:Date.now().toString(),title:document.getElementById('f-title').value.trim(),category:document.getElementById('f-category').value,situation:document.getElementById('f-situation').value.trim(),options:document.getElementById('f-options').value.trim(),chosen:document.getElementById('f-chosen').value.trim(),reasoning:document.getElementById('f-reasoning').value.trim(),confidence:document.getElementById('f-confidence').value,expected:exp,createdAt:new Date().toISOString(),reviews:[]});save();showToast('Decision recorded');renderList();showView('list')}

function openDetail(id){
  const d=decisions.find(x=>x.id===id);if(!d)return;currentDecisionId=id;
  document.getElementById('d-category').textContent=d.category;document.getElementById('d-title').textContent=d.title;
  document.getElementById('d-date').textContent=new Date(d.createdAt).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const n={Low:1,Medium:2,High:3}[d.confidence]||0,de=document.getElementById('d-confidence-dots');de.innerHTML='';
  for(let i=1;i<=3;i++){const dot=document.createElement('div');dot.className='confidence-dot'+(i<=n?' active':'');de.appendChild(dot)}
  const lbl=document.createElement('span');lbl.style.cssText='font-size:12px;color:var(--text-muted);margin-left:8px';lbl.textContent=d.confidence;de.appendChild(lbl);
  document.getElementById('d-situation').textContent=d.situation||'—';document.getElementById('d-options').textContent=d.options||'—';document.getElementById('d-chosen').textContent=d.chosen;document.getElementById('d-reasoning').textContent=d.reasoning;document.getElementById('d-expected').textContent=d.expected;
  const rc=document.getElementById('reviews-container'),rh=document.getElementById('reviews-heading');
  if(!d.reviews||!d.reviews.length){rh.textContent='No reviews yet';rc.innerHTML=''}
  else{rh.textContent=`${d.reviews.length} Review${d.reviews.length>1?'s':''}`;rc.innerHTML=d.reviews.map(r=>`<div class="review-card"><div class="review-card-header"><span class="review-rating">${r.rating}</span><span class="review-date">${new Date(r.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span></div><div class="detail-section-content" style="margin-bottom:10px">${esc(r.outcome)}</div>${r.learned?`<div style="padding-top:10px;border-top:1px solid var(--border)"><div class="detail-section-label" style="margin-bottom:6px">Lesson</div><div class="detail-section-content" style="font-style:italic">${esc(r.learned)}</div></div>`:''}</div>`).join('')}
  showView('detail');
}

function openAddReview(){document.getElementById('r-rating').value='';document.getElementById('r-outcome').value='';document.getElementById('r-learned').value='';document.querySelectorAll('#view-review .seg-opt').forEach(b=>b.classList.remove('selected'));showView('review')}
function saveReview(){const rating=document.getElementById('r-rating').value,outcome=document.getElementById('r-outcome').value.trim(),learned=document.getElementById('r-learned').value.trim();if(!rating){showToast('Please rate the outcome');return}if(!outcome){showToast('Please describe what happened');return}const d=decisions.find(x=>x.id===currentDecisionId);if(!d)return;d.reviews.push({date:new Date().toISOString(),rating,outcome,learned});save();showToast('Review saved');openDetail(currentDecisionId)}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

load();
applyTheme(currentThemeId,false);
renderList();
requestAnimationFrame(updateNavIndicator);
requestAnimationFrame(updateThemeTabIndicator);
window.addEventListener('resize',()=>{updateNavIndicator();updateThemeTabIndicator()});
</script>
</body>
</html>
